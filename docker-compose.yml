version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: classroom-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  ocr-service:
    build: ./ocr-service
    container_name: classroom-ocr-service
    environment:
      - PORT=5001
    ports:
      - "5001:5001"
    volumes:
      - ./backend/uploads:/app/backend/uploads # Share uploads with backend
      - ocr-index:/app/index_data

  backend:
    build: ./backend
    container_name: classroom-backend
    depends_on:
      - mongodb
      - ocr-service
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/classroom-app
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - NODE_ENV=production
      - OCR_SERVICE_URL=http://ocr-service:5001
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=/api
    container_name: classroom-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
  ocr-index:
